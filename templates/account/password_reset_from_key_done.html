{% extends "base.html" %}
{% block title %}Password Changed - Marketplace{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm p-4 text-center">
        <div style="font-size:2.5rem;">✅</div>
        <h4 class="fw-bold mt-2">Password Changed</h4>
        <p class="text-muted small mb-0">Your password has been successfully changed. You can now log in with your new password.</p>
        <a href="{% url 'account_login' %}" class="btn btn-primary w-100 mt-4">Go to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
