{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Change Password{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm p-4">
        <div class="text-center mb-4">
          <div style="font-size:2.5rem;">🔒</div>
          <h4 class="fw-bold mt-2">Change Password</h4>
          <p class="text-muted small">Enter your current password and choose a new one.</p>
        </div>
        <form method="post">
          {% csrf_token %}
          {{ form|crispy }}
          <button type="submit" class="btn btn-primary w-100 mt-2">Change Password</button>
          <a href="{% url 'users:settings' %}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
