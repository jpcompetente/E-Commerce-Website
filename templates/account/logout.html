{% extends "base.html" %}
{% block title %}Sign Out - Marketplace{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm p-5 text-center">
        <div style="font-size:3rem;">👋</div>
        <h3 class="fw-bold mt-3 mb-2">Sign Out</h3>
        <p class="text-muted mb-4">Are you sure you want to sign out?</p>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger btn-lg w-100">Sign Out</button>
        </form>
        <a href="/" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
