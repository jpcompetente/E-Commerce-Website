{% extends "base.html" %}
{% block title %}Check Your Email - Marketplace{% endblock %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-sm p-4 text-center">
        <div style="font-size:2.5rem;">📧</div>
        <h4 class="fw-bold mt-2">Check Your Email</h4>
        <p class="text-muted small mb-0">We have sent you an email with instructions to reset your password. If you do not see it, please check your spam folder.</p>
        <a href="{% url 'account_login' %}" class="btn btn-outline-secondary w-100 mt-4">Back to Login</a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
