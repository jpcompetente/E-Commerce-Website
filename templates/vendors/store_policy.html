{% extends "base.html" %}
{% block title %}Store Policy - {{ store.name }}{% endblock %}

{% block content %}
<div class="container py-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h2 class="fw-bold mb-1">Store Policies</h2>
      <p class="text-muted mb-0">{{ store.name }}</p>
    </div>
    <a href="{% url 'vendors:dashboard' %}" class="btn btn-outline-secondary btn-sm">
      <i class="bi bi-arrow-left me-1"></i>Dashboard
    </a>
  </div>

  <div class="card border-0 shadow-sm p-4">
    <form method="post">
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-semibold"><i class="bi bi-arrow-return-left text-primary me-2"></i>Return Policy</label>
        <textarea name="return_policy" class="form-control" rows="5"
          placeholder="e.g. Items can be returned within 7 days of delivery in original condition...">{{ policy.return_policy }}</textarea>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold"><i class="bi bi-truck text-success me-2"></i>Shipping Policy</label>
        <textarea name="shipping_policy" class="form-control" rows="5"
          placeholder="e.g. Orders are processed within 1-2 business days. Shipping takes 3-5 days...">{{ policy.shipping_policy }}</textarea>
      </div>
      <div class="mb-4">
        <label class="form-label fw-semibold"><i class="bi bi-shield-check text-info me-2"></i>Privacy Policy</label>
        <textarea name="privacy_policy" class="form-control" rows="5"
          placeholder="e.g. We collect only necessary information to process your orders...">{{ policy.privacy_policy }}</textarea>
      </div>
      <button type="submit" class="btn btn-primary">
        <i class="bi bi-save me-2"></i>Save Policies
      </button>
    </form>
  </div>
</div>
{% endblock %}
